<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Platform</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Vitrine ativa</p>
        <h1>Gallery Platform</h1>
        <p class="intro">
          Vitrine mobile-first conectada ao catalogo real de galerias, com
          fluxo preparado para entrada da galeria antes da visualizacao final.
        </p>
      </section>

      <section class="showcase" aria-labelledby="galerias-em-destaque">
        <div class="section-heading">
          <h2 id="galerias-em-destaque">Galerias</h2>
          <p>Capas reais vindas do catalogo local do projeto.</p>
        </div>

        <div class="gallery-grid" id="galleryGrid" aria-live="polite">
          <article class="gallery-card gallery-card--loading">
            <div class="cover-link">
              <div class="cover-shell cover-shell--placeholder"></div>
              <span class="cover-title">Carregando galerias...</span>
            </div>
          </article>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
