<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Platform</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Vitrine piloto</p>
        <h1>Gallery Platform</h1>
        <p class="intro">
          Uma primeira vitrine estatica para apresentar galerias fotograficas
          com foco mobile-first, navegacao simples e base pronta para evolucao.
        </p>
      </section>

      <section class="showcase" aria-labelledby="galerias-em-destaque">
        <div class="section-heading">
          <h2 id="galerias-em-destaque">Capas ficticias</h2>
          <p>Exemplos locais para validar estrutura visual sem galerias reais.</p>
        </div>

        <div class="gallery-grid">
          <article class="gallery-card">
            <a class="cover-link" href="#colecao-serra-clara">
              <img
                src="/assets/capa-serra.svg"
                alt="Capa ficticia da colecao Serra Clara"
              >
              <span class="cover-title">Serra Clara</span>
            </a>
          </article>

          <article class="gallery-card">
            <a class="cover-link" href="#colecao-costa-doce">
              <img
                src="/assets/capa-costa.svg"
                alt="Capa ficticia da colecao Costa Doce"
              >
              <span class="cover-title">Costa Doce</span>
            </a>
          </article>

          <article class="gallery-card">
            <a class="cover-link" href="#colecao-luz-de-estudio">
              <img
                src="/assets/capa-estudio.svg"
                alt="Capa ficticia da colecao Luz de Estudio"
              >
              <span class="cover-title">Luz de Estudio</span>
            </a>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
