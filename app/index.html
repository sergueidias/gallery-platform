<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Platform</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page">
      <a class="entry-back" href="/">Voltar para a home</a>
      <section class="hero">
        <p class="eyebrow">Vitrine de __DOMAIN_NAME__</p>
        <h1>__DOMAIN_NAME__</h1>
        <p class="intro">
          Home e vitrine separadas por dominio, usando o mesmo motor de
          aplicacao e um catalogo filtrado para este dominio.
        </p>
      </section>

      <section class="showcase" aria-labelledby="galerias-em-destaque">
        <div class="section-heading">
          <h2 id="galerias-em-destaque">Galerias</h2>
          <p>Capas reais vindas do catalogo local de __DOMAIN_NAME__.</p>
        </div>

        <div class="gallery-grid" id="galleryGrid" aria-live="polite">
          <article class="gallery-card gallery-card--loading">
            <div class="cover-link">
              <div class="cover-shell cover-shell--placeholder"></div>
              <span class="cover-title">Carregando galerias...</span>
            </div>
          </article>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
